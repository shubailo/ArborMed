<svg width="400" height="800" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="shadow">
      <feDropShadow dx="0" dy="4" stdDeviation="4" flood-color="#000" flood-opacity="0.1"/>
    </filter>
  </defs>

  <!-- Background Layer -->
  <rect width="400" height="800" fill="#F4F1ED" rx="30" />

  <!-- Isometric Background Room (Abstract) -->
  <polygon points="200,200 380,300 200,450 20,300" fill="#E8DCD1" />
  <polygon points="20,300 200,450 200,650 20,500" fill="#D3C7BC" />
  <polygon points="380,300 200,450 200,650 380,500" fill="#E0D3C7" />

  <!-- Avatar Character (Bean) -->
  <circle cx="200" cy="350" r="30" fill="#8CAA8C" />
  <rect x="180" y="380" width="40" height="50" fill="#8CAA8C" rx="10" />

  <!-- Medical Equipment Props -->
  <!-- Desk -->
  <rect x="230" y="420" width="80" height="40" fill="#806b5b" rx="4" transform="matrix(0.866 0.5 -0.866 0.5 240 180)" />

  <!-- Top Bar HUD -->
  <rect x="20" y="40" width="360" height="60" fill="white" rx="20" filter="url(#shadow)" />
  <circle cx="50" cy="70" r="20" fill="#D2B48C" />
  <text x="80" y="75" font-family="sans-serif" font-weight="bold" font-size="16" fill="#3D4035">Level 3</text>

  <rect x="250" y="55" width="110" height="30" fill="#F4F1ED" rx="15" />
  <circle cx="265" cy="70" r="10" fill="#FFD700" />
  <text x="285" y="75" font-family="sans-serif" font-weight="bold" font-size="14" fill="#3D4035">1,250</text>

  <!-- Side Actions (Shop, Settings, Friends) -->
  <g transform="translate(340, 150)">
    <circle cx="20" cy="20" r="25" fill="white" filter="url(#shadow)" />
    <path d="M12 12h16v16h-16z" fill="#8CAA8C" /> <!-- Icon Placeholder -->
  </g>
  <g transform="translate(340, 220)">
    <circle cx="20" cy="20" r="25" fill="white" filter="url(#shadow)" />
    <circle cx="20" cy="20" r="10" fill="#8CAA8C" /> <!-- Icon Placeholder -->
  </g>
  <g transform="translate(340, 290)">
    <circle cx="20" cy="20" r="25" fill="white" filter="url(#shadow)" />
    <rect x="10" y="10" width="20" height="20" fill="#8CAA8C" rx="4" /> <!-- Icon Placeholder -->
  </g>

  <!-- Bottom Interactive Area -->
  <rect x="0" y="650" width="400" height="150" fill="white" rx="30" filter="url(#shadow)" />
  <rect x="160" y="660" width="80" height="6" fill="#E8DCD1" rx="3" />

  <!-- Subject Cards Horizontal Scroll -->
  <g transform="translate(20, 680)">
    <rect x="0" y="0" width="140" height="90" fill="#F4F1ED" rx="15" />
    <text x="15" y="30" font-family="sans-serif" font-weight="bold" font-size="14" fill="#3D4035">Cardiology</text>
    <rect x="15" y="70" width="110" height="8" fill="#D3C7BC" rx="4" />
    <rect x="15" y="70" width="60" height="8" fill="#8CAA8C" rx="4" /> <!-- Progress -->
  </g>
  <g transform="translate(180, 680)">
    <rect x="0" y="0" width="140" height="90" fill="#F4F1ED" rx="15" />
    <text x="15" y="30" font-family="sans-serif" font-weight="bold" font-size="14" fill="#3D4035">Neurology</text>
    <rect x="15" y="70" width="110" height="8" fill="#D3C7BC" rx="4" />
    <rect x="15" y="70" width="20" height="8" fill="#8CAA8C" rx="4" /> <!-- Progress -->
  </g>

  <!-- Primary Action FAB (Study/Quiz) -->
  <circle cx="200" cy="620" r="40" fill="#8CAA8C" filter="url(#shadow)" />
  <polygon points="190,605 215,620 190,635" fill="white" />
</svg>
